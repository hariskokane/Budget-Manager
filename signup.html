<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up • Budget Manager</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body class="centered" style="position: relative; overflow: hidden;">
    <!-- Decorative background elements -->
    <div style="position: absolute; top: -100px; right: -100px; width: 300px; height: 300px; background: linear-gradient(135deg, var(--primary-600), var(--danger)); border-radius: 50%; filter: blur(80px); opacity: 0.3; z-index: -1;"></div>
    <div style="position: absolute; bottom: -150px; left: -50px; width: 400px; height: 400px; background: linear-gradient(135deg, var(--success), var(--primary)); border-radius: 50%; filter: blur(100px); opacity: 0.3; z-index: -1;"></div>
    
    <main class="auth-container" style="z-index: 1;">
      <section class="card auth-card" style="padding: 40px; max-width: 600px;">
        <div class="logo" style="width: 64px; height: 64px; font-size: 36px; margin-bottom: 24px; box-shadow: 0 8px 16px rgba(99, 102, 241, 0.2);">₹</div>
        <h1 style="font-weight: 800; font-size: 28px; letter-spacing: -0.5px;">Create your account</h1>
        <p class="muted">It only takes a minute</p>
        <form id="signupForm" class="form">
          <div class="form-row">
            <label for="fullName">Full Name</label>
            <input id="fullName" name="fullName" type="text" required placeholder="Your full name" />
          </div>
          <div class="form-row">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required placeholder="you@example.com" />
          </div>
          <div class="form-row two-col">
            <div>
              <label for="password">Password</label>
              <input id="password" name="password" type="password" minlength="6" required placeholder="At least 6 characters" />
            </div>
            <div>
              <label for="confirmPassword">Confirm Password</label>
              <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" required placeholder="Re-enter password" />
            </div>
          </div>
          <div class="form-row two-col">
            <div>
              <label for="phone">Phone Number</label>
              <input id="phone" name="phone" type="tel" pattern="[0-9]{10}" required placeholder="9876543210" />
            </div>
            <div>
              <label for="dob">Date of Birth</label>
              <input id="dob" name="dob" type="date" required />
            </div>
          </div>
          <div class="form-row two-col">
            <div>
              <label for="gender">Gender</label>
              <select id="gender" name="gender" required>
                <option value="" disabled selected>Select</option>
                <option>Male</option>
                <option>Female</option>
              </select>
            </div>
            <div>
              <label for="address">Address</label>
              <input id="address" name="address" type="text" required placeholder="Street, City, PIN" />
            </div>
          </div>
          <div class="form-row two-col">
            <div>
              <label for="jobType">Job Details</label>
              <select id="jobType" name="jobType" required>
                <option value="" disabled selected>Select</option>
                <option value="business">Business</option>
                <option value="job">Job</option>
                <option value="freelancer">Freelancer</option>
                <option value="student">Student</option>
                <option value="unemployed">Unemployed</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div>
              <label for="monthlyIncome">Monthly Income (₹)</label>
              <input id="monthlyIncome" name="monthlyIncome" type="number" min="0" step="0.01" required placeholder="e.g., 50000" />
            </div>
          </div>

          <button type="submit" class="btn primary full">Create Account</button>
        </form>
        <div class="auth-alt">
          <span class="muted">Already have an account?</span>
          <a href="login.html" class="btn link">Login</a>
        </div>
        <p id="signupError" class="error" aria-live="polite"></p>
      </section>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
  </body>
  </html>
